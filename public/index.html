<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>多Agent协同运营自动化系统</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="mark">MA</span>
        <div>
          <strong>多Agent协同运营</strong>
          <small>Automation Console</small>
        </div>
      </div>
      <nav>
        <button class="active" data-view="dashboard">任务看板</button>
        <button data-view="agents">Agent 编排</button>
        <button data-view="logs">事件日志</button>
      </nav>
      <div class="status-pill" id="health">检查服务中</div>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <h1>运营任务控制台</h1>
          <p>创建任务，运行工作流，查看每个 Agent 的处理结果。</p>
        </div>
        <button class="primary" id="refreshBtn">刷新</button>
      </header>

      <section class="layout">
        <form class="panel form-panel" id="taskForm">
          <h2>新建运营任务</h2>
          <label>
            任务名称
            <input name="title" value="618 会员召回活动" required />
          </label>
          <label>
            业务场景
            <select name="scenario" id="scenarioSelect"></select>
          </label>
          <label>
            目标
            <textarea name="objective" required>提升 90 天未购买会员的复购率</textarea>
          </label>
          <label>
            人群
            <input name="audience" value="90 天未购买且历史客单价大于 200 元的会员" required />
          </label>
          <label>
            约束
            <textarea name="constraints" required>预算 2 万元，不能使用收益承诺或夸大表达</textarea>
          </label>
          <button class="primary" type="submit">创建任务</button>
        </form>

        <section class="panel">
          <div class="section-head">
            <h2>任务列表</h2>
            <span id="taskCount">0 项</span>
          </div>
          <div class="task-list" id="taskList"></div>
        </section>
      </section>

      <section class="panel details-panel">
        <div class="section-head">
          <h2>任务详情</h2>
          <button id="runBtn" class="secondary" disabled>运行工作流</button>
        </div>
        <div id="taskDetails" class="empty">请选择一个任务</div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Agent 与工作流</h2>
          <span id="agentCount">0 个 Agent</span>
        </div>
        <div class="agent-grid" id="agentGrid"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
